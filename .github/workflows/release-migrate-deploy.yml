name: Release (Migrate + Deploy)

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to deploy before migrations (branch/tag/sha)"
        required: false
        default: "main"
      e_learning_force:
        description: "Run e-learning mega-pack with --force"
        required: false
        type: boolean
        default: false
      install_mode:
        description: "Deployment mode"
        required: true
        type: choice
        options:
          - incremental
          - full_install
        default: incremental
      celery_action:
        description: "Celery mode during deploy"
        required: true
        type: choice
        options:
          - keep
          - enable
          - disable
        default: keep
      python_seed_profile:
        description: "Python course seeding profile"
        required: true
        type: choice
        options:
          - all
          - data-analysis
          - none
        default: all

concurrency:
  group: release-migrate-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Run DB migrations
    # Reuses migrations-only workflow, which applies Alembic heads,
    # seeds subscription plans, and seeds/verifies e-learning content.
    uses: ./.github/workflows/migrations-only.yml
    with:
      git_ref: ${{ github.event.inputs.git_ref || 'main' }}
      python_seed_profile: ${{ github.event.inputs.python_seed_profile || 'all' }}
    secrets: inherit

  deploy:
    name: Deploy application
    needs: migrate
    uses: ./.github/workflows/deploy.yml
    with:
      install_mode: ${{ github.event.inputs.install_mode || 'incremental' }}
      celery_action: ${{ github.event.inputs.celery_action || 'keep' }}
    secrets: inherit

  seed_e_learning_mega_pack:
    name: Seed E-Learning Mega Pack
    needs: deploy
    uses: ./.github/workflows/e-learning-mega-pack.yml
    with:
      git_ref: ${{ github.event.inputs.git_ref || 'main' }}
      force: ${{ github.event.inputs.e_learning_force == 'true' || github.event.inputs.e_learning_force == true }}
    secrets: inherit
