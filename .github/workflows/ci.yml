name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests-and-migrations:
    runs-on: ubuntu-latest
    env:
      CI_POSTGRES_DB: ${{ vars.CI_POSTGRES_DB || 'audela_ci' }}
      CI_POSTGRES_USER: ${{ vars.CI_POSTGRES_USER || 'postgres' }}
      CI_POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD || 'postgres' }}
      CI_DATABASE_URL: postgresql+psycopg2://${{ vars.CI_POSTGRES_USER || 'postgres' }}:${{ secrets.CI_POSTGRES_PASSWORD || 'postgres' }}@localhost:5432/${{ vars.CI_POSTGRES_DB || 'audela_ci' }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ${{ vars.CI_POSTGRES_DB || 'audela_ci' }}
          POSTGRES_USER: ${{ vars.CI_POSTGRES_USER || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD || 'postgres' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ${{ vars.CI_POSTGRES_USER || 'postgres' }} -d ${{ vars.CI_POSTGRES_DB || 'audela_ci' }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev postgresql-client

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Validate installed packages
        run: |
          pip check

      - name: i18n lint (non-blocking)
        run: |
          python scripts/i18n_lint.py --max 250 || true

      - name: Python compile preflight
        run: |
          python -m py_compile audela/blueprints/credit/routes.py
          python -m py_compile audela/i18n.py
          python -m py_compile audela/tasks/project_notifications.py

      - name: Validate Credit template syntax
        env:
          AUTO_CREATE_DB: "false"
        run: |
          python - <<'PY'
          from audela import create_app

          app = create_app()
          with app.app_context():
              names = app.jinja_env.list_templates(
                  filter_func=lambda n: n.startswith("credit/") and n.endswith(".html")
              )
              for name in names:
                  app.jinja_env.get_template(name)
          print(f"validated {len(names)} credit templates")
          PY

      - name: Wait for PostgreSQL
        env:
          PGPASSWORD: ${{ env.CI_POSTGRES_PASSWORD }}
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U "$CI_POSTGRES_USER" -d "$CI_POSTGRES_DB" && exit 0
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Check Alembic heads
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          flask --app app db heads

      - name: Ensure a single Alembic head
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          HEAD_COUNT=$(flask --app app db heads | awk '/^[0-9a-f]+/ {c++} END {print c+0}')
          test "$HEAD_COUNT" -eq 1

      - name: Dry-run migrations SQL (no apply)
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          flask --app app db upgrade --sql > /tmp/migrations.sql
          test -s /tmp/migrations.sql

      - name: Apply migrations in CI DB
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          flask --app app db upgrade

      - name: Validate migration state
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          flask --app app db current
          flask --app app db check
          flask --app app db upgrade

      - name: Verify credit approval_date columns
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          python - <<'PY'
          from audela import create_app
          from audela.extensions import db
          from sqlalchemy import inspect

          app = create_app()
          with app.app_context():
              ins = inspect(db.engine)
              tables = set(ins.get_table_names())
              assert "credit_covenants" in tables, "credit_covenants missing"
              assert "credit_facility_utilizations" in tables, "credit_facility_utilizations missing"
              expected = {
                  "credit_deals": "approval_date",
                  "credit_facilities": "approval_date",
                  "credit_financial_statements": "approval_date",
                  "credit_memos": "approval_date",
              }
              for table, col in expected.items():
                  cols = {c["name"] for c in ins.get_columns(table)}
                  assert col in cols, f"{table}.{col} missing"
              print("credit approval_date columns verified")
          PY

      - name: Credit readiness validation
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          python validate_credit_readiness.py --mode all
