name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests-and-migrations:
    runs-on: ubuntu-latest
    env:
      CI_POSTGRES_DB: ${{ vars.CI_POSTGRES_DB || 'audela_ci' }}
      CI_POSTGRES_USER: ${{ vars.CI_POSTGRES_USER || 'postgres' }}
      CI_POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD || 'postgres' }}
      CI_DATABASE_URL: postgresql+psycopg2://${{ vars.CI_POSTGRES_USER || 'postgres' }}:${{ secrets.CI_POSTGRES_PASSWORD || 'postgres' }}@localhost:5432/${{ vars.CI_POSTGRES_DB || 'audela_ci' }}
      CI_MLFLOW_TRACKING_URI: http://127.0.0.1:5001
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ${{ vars.CI_POSTGRES_DB || 'audela_ci' }}
          POSTGRES_USER: ${{ vars.CI_POSTGRES_USER || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD || 'postgres' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ${{ vars.CI_POSTGRES_USER || 'postgres' }} -d ${{ vars.CI_POSTGRES_DB || 'audela_ci' }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev postgresql-client

      - name: Start MLflow tracking server (container)
        run: |
          docker rm -f ci-mlflow >/dev/null 2>&1 || true
          docker run -d --name ci-mlflow -p 5001:5000 ghcr.io/mlflow/mlflow:v2.17.2 \
            mlflow server \
            --host 0.0.0.0 \
            --port 5000 \
            --backend-store-uri sqlite:////tmp/mlflow.db \
            --artifacts-destination /tmp/mlflow-artifacts

      - name: Wait for MLflow
        run: |
          for i in {1..30}; do
            if curl -fsS "$CI_MLFLOW_TRACKING_URI/" >/dev/null; then
              exit 0
            fi
            echo "Waiting for MLflow... ($i/30)"
            sleep 2
          done
          echo "MLflow did not become ready in time"
          docker logs ci-mlflow || true
          exit 1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install jupyterlab ipywidgets

      - name: Validate installed packages
        run: |
          pip check

      - name: i18n lint (non-blocking)
        run: |
          python scripts/i18n_lint.py --max 250 || true

      - name: Python compile preflight
        run: |
          python -m py_compile audela/blueprints/credit/routes.py
          python -m py_compile audela/i18n.py
          python -m py_compile audela/tasks/project_notifications.py

      - name: Jupyter integration smoke
        run: |
          python -m py_compile scripts/jupyter_embed_config.py
          bash -n scripts/start_jupyter_embed.sh
          python - <<'PY'
          import json
          from pathlib import Path

          nb_path = Path("notebooks/audela_model_registration.ipynb")
          data = json.loads(nb_path.read_text(encoding="utf-8"))
          cells = data.get("cells") if isinstance(data, dict) else None
          assert isinstance(cells, list) and len(cells) >= 4, "notebook should contain setup + builder + save cells"

          merged_source = "\n".join(
              "\n".join(cell.get("source") or [])
              for cell in cells
              if isinstance(cell, dict)
          )
          required_tokens = [
              "MODEL_BUILDERS",
              "build_linear_regression",
              "save_to_audela",
              "register-notebook-model",
          ]
          for token in required_tokens:
              assert token in merged_source, f"missing notebook token: {token}"

          print("jupyter integration smoke ok")
          PY

      - name: JupyterHub integration contract
        run: |
          python - <<'PY'
          from audela import create_app

          app = create_app()
          with app.app_context():
              cfg = app.config
              assert "JUPYTERHUB_BASE_URL" in cfg
              assert "JUPYTER_SUPPORTED_KERNELS" in cfg
              assert "JUPYTER_PREBUILT_ENVS" in cfg
              assert isinstance(str(cfg.get("JUPYTER_SUPPORTED_KERNELS") or ""), str)
          print("jupyterhub config contract ok")
          PY

      - name: Validate Credit template syntax
        env:
          AUTO_CREATE_DB: "false"
        run: |
          python - <<'PY'
          from audela import create_app

          app = create_app()
          with app.app_context():
              names = app.jinja_env.list_templates(
                  filter_func=lambda n: n.startswith("credit/") and n.endswith(".html")
              )
              for name in names:
                  app.jinja_env.get_template(name)
          print(f"validated {len(names)} credit templates")
          PY

      - name: Wait for PostgreSQL
        env:
          PGPASSWORD: ${{ env.CI_POSTGRES_PASSWORD }}
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U "$CI_POSTGRES_USER" -d "$CI_POSTGRES_DB" && exit 0
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Check Alembic heads
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          flask --app app db heads

      - name: Ensure Alembic heads exist
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          HEAD_COUNT=$(flask --app app db heads | awk '/^[0-9a-f]+/ {c++} END {print c+0}')
          test "$HEAD_COUNT" -eq 1

      - name: Dry-run migrations SQL (no apply)
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          flask --app app db upgrade heads --sql > /tmp/migrations.sql
          test -s /tmp/migrations.sql

      - name: Apply migrations in CI DB
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          flask --app app db upgrade heads

      - name: Verify e-learning migration tables
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          python - <<'PY'
          from sqlalchemy import inspect
          from audela import create_app
          from audela.extensions import db

          app = create_app()
          with app.app_context():
            insp = inspect(db.engine)
            tables = set(insp.get_table_names())
            required = {
              "e_learning_student_files",
              "e_learning_quizzes",
              "e_learning_quiz_questions",
              "e_learning_quiz_options",
              "user_quiz_attempts",
            }
            missing = sorted(required - tables)
            assert not missing, f"Missing migrated e-learning tables: {missing}"

            q_cols = {c["name"] for c in insp.get_columns("e_learning_quiz_questions")}
            assert "allow_partial_credit" in q_cols, "missing e_learning_quiz_questions.allow_partial_credit"
            assert "penalty_points" in q_cols, "missing e_learning_quiz_questions.penalty_points"

            a_cols = {c["name"] for c in insp.get_columns("user_quiz_attempts")}
            assert "question_scores_json" in a_cols, "missing user_quiz_attempts.question_scores_json"
            print("e-learning migration tables verified")
          PY

      - name: Seed default subscription plans (idempotent)
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          python - <<'PY'
          from audela import create_app
          from audela.services.subscription_service import SubscriptionService
          from audela.models import SubscriptionPlan

          app = create_app()
          with app.app_context():
              SubscriptionService._ensure_default_plans_seeded()
              plans = {p.code for p in SubscriptionPlan.query.all()}
              assert "free" in plans, "missing free plan"
              assert "enterprise" in plans, "missing enterprise plan"
              print(f"subscription plans ready: {len(plans)}")
          PY

      - name: Seed e-learning content (idempotent)
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          flask --app app seed-e-learning
          python - <<'PY'
          from audela import create_app
          from audela.models import ELearningModule, ELearningSubject

          app = create_app()
          with app.app_context():
              subject = ELearningSubject.query.filter_by(code="sql").first()
              assert subject is not None, "sql subject missing"
              module_codes = {m.code for m in ELearningModule.query.filter_by(subject_id=subject.id).all()}
              assert "sql201" in module_codes, "sql201 module missing"
              assert len(module_codes) >= 12, f"expected >=12 SQL modules, got {len(module_codes)}"
              print(f"e-learning modules ready: {len(module_codes)}")
          PY

      - name: Validate migration state
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          flask --app app db current
          flask --app app db check
          flask --app app db upgrade heads

      - name: Verify credit approval_date columns
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          python - <<'PY'
          from audela import create_app
          from audela.extensions import db
          from sqlalchemy import inspect

          app = create_app()
          with app.app_context():
              ins = inspect(db.engine)
              tables = set(ins.get_table_names())
              assert "credit_covenants" in tables, "credit_covenants missing"
              assert "credit_facility_utilizations" in tables, "credit_facility_utilizations missing"
              expected = {
                  "credit_deals": "approval_date",
                  "credit_facilities": "approval_date",
                  "credit_financial_statements": "approval_date",
                  "credit_memos": "approval_date",
              }
              for table, col in expected.items():
                  cols = {c["name"] for c in ins.get_columns(table)}
                  assert col in cols, f"{table}.{col} missing"
              print("credit approval_date columns verified")
          PY

      - name: Credit readiness validation
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          AUTO_CREATE_DB: "false"
        run: |
          python validate_credit_readiness.py --mode all

      - name: MLflow smoke test
        env:
          MLFLOW_TRACKING_URI: ${{ env.CI_MLFLOW_TRACKING_URI }}
        run: |
          python - <<'PY'
          import os
          import time

          import mlflow
          from mlflow.tracking import MlflowClient

          uri = str(os.environ.get("MLFLOW_TRACKING_URI") or "").strip()
          assert uri, "MLFLOW_TRACKING_URI missing"
          mlflow.set_tracking_uri(uri)

          exp_name = "audela-ci-smoke"
          exp = mlflow.get_experiment_by_name(exp_name)
          exp_id = mlflow.create_experiment(exp_name) if exp is None else exp.experiment_id

          run_name = f"ci-{int(time.time())}"
          with mlflow.start_run(experiment_id=exp_id, run_name=run_name) as run:
              mlflow.log_param("pipeline", "ci")
              mlflow.log_metric("ok", 1.0)
              run_id = run.info.run_id

          client = MlflowClient(tracking_uri=uri)
          fetched = client.get_run(run_id)
          assert fetched.info.run_id == run_id
          print(f"mlflow smoke test ok: {run_id}")
          PY

      - name: Cleanup MLflow container
        if: always()
        run: |
          docker rm -f ci-mlflow >/dev/null 2>&1 || true
