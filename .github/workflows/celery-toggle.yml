name: Manage Celery Services (manual)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Celery action"
        required: true
        type: choice
        options:
          - disable
          - enable
          - restart
          - status
        default: disable

jobs:
  manage-celery:
    runs-on: ubuntu-latest
    environment: audeladesdonnees

    steps:
      - name: Manage celery via SSH (root, attempt 1)
        id: celery_ssh_1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 90s
          command_timeout: 30m
          script: &celery_script |
            set -e
            ACTION="${{ github.event.inputs.action }}"
            echo "🧭 Requested action: $ACTION"

            cd /root/audela_flask_website

            COMPOSE_CMD="docker compose"
            if ! docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            fi

            COMPOSE_FILES="-f docker-compose.yml"
            if [ -f docker-compose.letsencrypt.yml ]; then
              COMPOSE_FILES="$COMPOSE_FILES -f docker-compose.letsencrypt.yml"
            fi

            wait_service_running() {
              svc="$1"
              timeout="${2:-90}"
              start_ts="$(date +%s)"

              while true; do
                cid="$($COMPOSE_CMD $COMPOSE_FILES ps -q "$svc" 2>/dev/null | head -n1 || true)"
                if [ -n "$cid" ]; then
                  running="$(docker inspect -f '{{.State.Running}}' "$cid" 2>/dev/null || echo false)"
                  status="$(docker inspect -f '{{.State.Status}}' "$cid" 2>/dev/null || echo unknown)"
                  if [ "$running" = "true" ]; then
                    health="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$cid" 2>/dev/null || echo none)"
                    echo "✅ $svc running (status=$status, health=$health, container=$cid)"
                    return 0
                  fi
                  echo "⏳ Waiting $svc (status=$status, container=$cid)"
                else
                  echo "⏳ Waiting $svc container to be created"
                fi

                now_ts="$(date +%s)"
                if [ $((now_ts - start_ts)) -ge "$timeout" ]; then
                  echo "❌ $svc did not reach running state within ${timeout}s"
                  return 1
                fi
                sleep 3
              done
            }

            print_celery_logs() {
              echo "🪵 Recent logs"
              $COMPOSE_CMD $COMPOSE_FILES logs --tail=120 celery-worker celery-beat || true
            }

            case "$ACTION" in
              disable)
                echo "⏸️ Stopping Celery services"
                $COMPOSE_CMD $COMPOSE_FILES stop celery-beat celery-worker || true
                $COMPOSE_CMD $COMPOSE_FILES rm -f celery-beat celery-worker || true
                ;;

              enable)
                echo "▶️ Starting Celery services"
                $COMPOSE_CMD $COMPOSE_FILES up -d --no-deps celery-worker celery-beat
                ;;

              restart)
                echo "🔄 Restarting Celery services"
                $COMPOSE_CMD $COMPOSE_FILES up -d --no-deps celery-worker celery-beat
                $COMPOSE_CMD $COMPOSE_FILES restart celery-worker celery-beat
                ;;

              status)
                echo "📊 Celery services status"
                ;;

              *)
                echo "❌ Unknown action: $ACTION"
                exit 1
                ;;
            esac

            echo "📋 docker compose ps"
            $COMPOSE_CMD $COMPOSE_FILES ps celery-worker celery-beat || true

            if [ "$ACTION" != "disable" ]; then
              wait_service_running celery-worker 120 || { print_celery_logs; exit 1; }
              wait_service_running celery-beat 120 || { print_celery_logs; exit 1; }

              echo "🧪 Verifying Celery task execution"
              $COMPOSE_CMD $COMPOSE_FILES exec -T audela python - <<'PY'
from audela.celery_app import celery_app

job = celery_app.send_task("audela.tasks.celery_healthcheck")
print(f"task_id={job.id}")
result = job.get(timeout=25)
print(f"result={result}")
if not (isinstance(result, dict) and result.get("ok") is True):
    raise SystemExit("Celery healthcheck task did not return ok=true")
PY

              print_celery_logs
            fi

            echo "✅ Celery action completed"

      - name: Manage celery via SSH (root, attempt 2)
        id: celery_ssh_2
        if: steps.celery_ssh_1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 90s
          command_timeout: 30m
          script: *celery_script

      - name: Fail if celery SSH failed twice
        if: steps.celery_ssh_1.outcome == 'failure' && steps.celery_ssh_2.outcome == 'failure'
        run: |
          echo "❌ Celery SSH action failed twice (connection/handshake issue)."
          exit 1
