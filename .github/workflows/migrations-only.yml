name: Run DB Migrations (manual)

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to deploy before migrations (branch/tag/sha)"
        required: false
        default: "main"

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: audeladesdonnees

    steps:
      - name: Run migrations via SSH (root, attempt 1)
        id: migrate_ssh_1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 90s
          command_timeout: 40m
          script: &migrate_script |
            set -e
            echo "🛠️ Migrations-only job started"

            cd /root/audela_flask_website

            TARGET_REF="${{ github.event.inputs.git_ref }}"
            if [ -z "$TARGET_REF" ]; then TARGET_REF="main"; fi

            echo "📥 Git fetch/reset to $TARGET_REF"
            git fetch --all --prune
            git checkout "$TARGET_REF"
            git reset --hard "origin/$TARGET_REF" || true

            COMPOSE_CMD="docker compose"
            if ! docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            fi

            if [ ! -f .env ]; then
              echo "⚠️ .env missing on server"
              if [ -n "${{ secrets.SERVER_ENV_FILE }}" ]; then
                printf "%s" "${{ secrets.SERVER_ENV_FILE }}" > .env
                chmod 600 .env || true
                echo "✅ .env bootstrapped from GitHub secret SERVER_ENV_FILE"
              else
                echo "❌ .env missing and secret SERVER_ENV_FILE is not set"
                echo "   Configure SERVER_ENV_FILE (full .env content) in GitHub Environment secrets."
                exit 1
              fi
            fi

            echo "🚀 Ensure app container is up (no deps rebuild)"
            $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml up -d --no-deps audela

            echo "⏳ Waiting audela container readiness"
            for i in $(seq 1 30); do
              if $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml exec -T audela sh -lc "echo ready" >/dev/null 2>&1; then
                break
              fi
              echo "Waiting audela... ($i/30)"
              sleep 2
            done

            echo "🧭 Alembic heads"
            $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml exec -T audela flask db heads || true

            pre_stamp_if_all_tables_exist () {
              local rev="$1"
              shift
              local all_exist="1"
              local tbl
              local exists

              for tbl in "$@"; do
                exists="$($COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml exec -T audela python -c "from sqlalchemy import text; from audela import create_app; from audela.extensions import db; app=create_app(); ctx=app.app_context(); ctx.push(); e=db.session.execute(text(\"SELECT to_regclass('public.${tbl}')\")).scalar(); print('1' if e else '0'); ctx.pop()" 2>/dev/null || echo 0)"
                if [ "$exists" != "1" ]; then
                  all_exist="0"
                  echo "ℹ️ ${tbl} missing -> not stamping ${rev}"
                  break
                fi
              done

              if [ "$all_exist" = "1" ]; then
                echo "ℹ️ all target tables exist -> pre-stamp ${rev}"
                $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml exec -T audela flask db stamp "$rev" || true
              fi
            }

            pre_stamp_if_all_tables_exist 20260305_add_credit_module_tables \
              credit_borrowers \
              credit_deals \
              credit_facilities \
              credit_collaterals \
              credit_guarantors \
              credit_financial_statements \
              credit_ratio_snapshots \
              credit_memos \
              credit_approvals \
              credit_documents

            echo "⬆️ Apply migrations"
            $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml exec -T audela flask db upgrade

            echo "✅ Verify finance_accounting_periods exists"
            $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml exec -T audela python -c "from sqlalchemy import inspect, text; from audela import create_app; from audela.extensions import db; app=create_app(); ctx=app.app_context(); ctx.push(); exists=db.session.execute(text(\"SELECT to_regclass('public.finance_accounting_periods')\")).scalar(); assert exists, 'finance_accounting_periods table not found'; ci=inspect(db.engine); assert 'credit_borrowers' in ci.get_table_names(), 'credit_borrowers table not found'; cols={c['name'] for c in ci.get_columns('credit_borrowers')}; assert 'sector_id' in cols and 'country_id' in cols and 'rating_id' in cols, 'credit_borrowers FK columns missing'; print('finance_accounting_periods table found:', exists); print('credit_borrowers schema verified'); ctx.pop()"

            echo "✅ Migrations-only job completed"

      - name: Run migrations via SSH (root, attempt 2)
        id: migrate_ssh_2
        if: steps.migrate_ssh_1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 90s
          command_timeout: 40m
          script: *migrate_script

      - name: Fail if migrations SSH failed twice
        if: steps.migrate_ssh_1.outcome == 'failure' && steps.migrate_ssh_2.outcome == 'failure'
        run: |
          echo "❌ Migrations SSH failed twice (connection/handshake issue)."
          exit 1
