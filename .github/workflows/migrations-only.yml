name: Run DB Migrations (manual)

on:
  workflow_call:
    inputs:
      git_ref:
        description: "Git ref to deploy before migrations (branch/tag/sha)"
        required: false
        type: string
        default: "main"
      python_seed_profile:
        description: "Python seeding profile: all, data-analysis, none"
        required: false
        type: string
        default: "all"
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to deploy before migrations (branch/tag/sha)"
        required: false
        default: "main"
      python_seed_profile:
        description: "Python seeding profile"
        required: false
        type: choice
        options:
          - all
          - data-analysis
          - none
        default: all

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: audeladesdonnees

    steps:
      - name: Run migrations via SSH (root, attempt 1)
        id: migrate_ssh_1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 90s
          command_timeout: 40m
          script: &migrate_script |
            set -e
            echo "🛠️ Migrations-only job started"

            cd /root/audela_flask_website

            TARGET_REF="${{ inputs.git_ref || github.event.inputs.git_ref }}"
            if [ -z "$TARGET_REF" ]; then TARGET_REF="main"; fi
            PYTHON_SEED_PROFILE="${{ inputs.python_seed_profile || github.event.inputs.python_seed_profile }}"
            if [ -z "$PYTHON_SEED_PROFILE" ]; then PYTHON_SEED_PROFILE="all"; fi
            echo "🐍 Python seed profile: $PYTHON_SEED_PROFILE"

            echo "📥 Git fetch/reset to $TARGET_REF"
            git fetch --all --prune
            git checkout "$TARGET_REF"
            git reset --hard "origin/$TARGET_REF" || true

            COMPOSE_CMD="docker compose"
            if ! docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            fi

            if [ ! -f .env ]; then
              echo "⚠️ .env missing on server"
              if [ -n "${{ secrets.SERVER_ENV_FILE }}" ]; then
                printf "%s" "${{ secrets.SERVER_ENV_FILE }}" > .env
                chmod 600 .env || true
                echo "✅ .env bootstrapped from GitHub secret SERVER_ENV_FILE"
              else
                echo "❌ .env missing and secret SERVER_ENV_FILE is not set"
                echo "   Configure SERVER_ENV_FILE (full .env content) in GitHub Environment secrets."
                exit 1
              fi
            fi

            echo "🚀 Ensure app container is up (no deps rebuild)"
            $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml up -d --no-deps audela

            # Use one-off runs for migrations to avoid failures when audela service
            # is restarting due to pending schema checks/startup probes.
            aud_run () {
              $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml run --rm --no-deps --entrypoint "" audela "$@"
            }

            echo "🧭 Alembic heads"
            aud_run flask db heads || true

            pre_stamp_if_all_tables_exist () {
              local rev="$1"
              shift
              local all_exist="1"
              local tbl
              local exists

              for tbl in "$@"; do
                exists="$(aud_run python -c "from sqlalchemy import text; from audela import create_app; from audela.extensions import db; app=create_app(); ctx=app.app_context(); ctx.push(); e=db.session.execute(text(\"SELECT to_regclass('public.${tbl}')\")).scalar(); print('1' if e else '0'); ctx.pop()" 2>/dev/null || echo 0)"
                if [ "$exists" != "1" ]; then
                  all_exist="0"
                  echo "ℹ️ ${tbl} missing -> not stamping ${rev}"
                  break
                fi
              done

              if [ "$all_exist" = "1" ]; then
                echo "ℹ️ all target tables exist -> pre-stamp ${rev}"
                aud_run flask db stamp "$rev" || true
              fi
            }

            pre_stamp_if_all_tables_exist 20260305_add_credit_module_tables \
              credit_borrowers \
              credit_deals \
              credit_facilities \
              credit_collaterals \
              credit_guarantors \
              credit_financial_statements \
              credit_ratio_snapshots \
              credit_memos \
              credit_approvals \
              credit_documents

            pre_stamp_if_all_tables_exist 20260315_add_finance_quotes_tables \
              finance_quotes \
              finance_quote_lines

            ensure_public_page_visits_geo_columns () {
              echo "🩹 Ensure public_page_visits geo/language columns exist (idempotent)"
              aud_run python -c "from sqlalchemy import text; from audela import create_app; from audela.extensions import db; app=create_app(); ctx=app.app_context(); ctx.push(); exists=db.session.execute(text(\"SELECT to_regclass('public.public_page_visits')\")).scalar(); print('public_page_visits exists:', bool(exists)); db.session.execute(text(\"ALTER TABLE public.public_page_visits ADD COLUMN IF NOT EXISTS country_code VARCHAR(8)\")) if exists else None; db.session.execute(text(\"ALTER TABLE public.public_page_visits ADD COLUMN IF NOT EXISTS language_code VARCHAR(12)\")) if exists else None; db.session.execute(text(\"CREATE INDEX IF NOT EXISTS ix_public_page_visits_country_code ON public.public_page_visits (country_code)\")) if exists else None; db.session.execute(text(\"CREATE INDEX IF NOT EXISTS ix_public_page_visits_language_code ON public.public_page_visits (language_code)\")) if exists else None; db.session.commit() if exists else None; print('public_page_visits geo/language columns ready') if exists else None; ctx.pop()"
            }

            ensure_public_page_visits_geo_columns

            echo "⬆️ Apply migrations"
            set +e
            MIG_OUT="$(aud_run flask db upgrade heads 2>&1)"
            MIG_RC=$?
            set -e

            if [ "$MIG_RC" -ne 0 ]; then
              echo "$MIG_OUT"
              if echo "$MIG_OUT" | grep -Eqi "UndefinedColumn" && echo "$MIG_OUT" | grep -Eqi "country_code"; then
                echo "⚠️ Missing country_code detected during migration -> repairing schema and retrying once"
                ensure_public_page_visits_geo_columns
                aud_run flask db upgrade heads
              else
                exit "$MIG_RC"
              fi
            else
              echo "$MIG_OUT"
            fi

            echo "🌱 Seed default subscription plans (idempotent)"
            aud_run python -c "from audela import create_app; from audela.services.subscription_service import SubscriptionService; from audela.models import SubscriptionPlan; app=create_app(); ctx=app.app_context(); ctx.push(); SubscriptionService._ensure_default_plans_seeded(); plans={p.code for p in SubscriptionPlan.query.all()}; assert 'free' in plans, 'free plan missing'; assert 'enterprise' in plans, 'enterprise plan missing'; print('subscription plans ready:', len(plans)); ctx.pop()"

            echo "🎓 Seed e-learning content (idempotent)"
            aud_run flask seed-e-learning
            aud_run python -c "from audela import create_app; from audela.models import ELearningSubject, ELearningModule; app=create_app(); ctx=app.app_context(); ctx.push(); subject=ELearningSubject.query.filter_by(code='sql').first(); assert subject is not None, 'sql subject missing'; modules={m.code for m in ELearningModule.query.filter_by(subject_id=subject.id).all()}; assert 'sql201' in modules, 'sql201 module missing'; assert len(modules) >= 12, f'expected >=12 SQL modules, got {len(modules)}'; print('e-learning modules ready:', len(modules)); ctx.pop()"

            if [ "$PYTHON_SEED_PROFILE" = "all" ]; then
              echo "🐍 Seed Python tracks (idempotent)"
              aud_run flask seed-python-tracks
              aud_run python -c "from audela import create_app; from audela.models import ELearningSubject; app=create_app(); ctx=app.app_context(); ctx.push(); assert ELearningSubject.query.filter_by(code='python-data-analysis').first() is not None, 'python-data-analysis subject missing'; assert ELearningSubject.query.filter_by(code='python-fundamentals').first() is not None, 'python-fundamentals subject missing'; assert ELearningSubject.query.filter_by(code='machine-learning-python').first() is not None, 'machine-learning-python subject missing'; assert ELearningSubject.query.filter_by(code='django-web-development').first() is not None, 'django-web-development subject missing'; print('python subjects ready'); ctx.pop()"
            elif [ "$PYTHON_SEED_PROFILE" = "data-analysis" ]; then
              echo "🐍 Seed Python Data Analysis only (idempotent)"
              aud_run flask seed-python-data-analysis
              aud_run python -c "from audela import create_app; from audela.models import ELearningSubject; app=create_app(); ctx=app.app_context(); ctx.push(); assert ELearningSubject.query.filter_by(code='python-data-analysis').first() is not None, 'python-data-analysis subject missing'; print('python-data-analysis subject ready'); ctx.pop()"
            elif [ "$PYTHON_SEED_PROFILE" = "none" ]; then
              echo "⏭️ Skipping Python seeding (python_seed_profile=none)"
            else
              echo "❌ Invalid python_seed_profile: $PYTHON_SEED_PROFILE"
              echo "   Allowed values: all | data-analysis | none"
              exit 1
            fi

            echo "🧪 Ensure database is at Alembic head(s)"
            HEAD_REVS="$(aud_run flask db heads | awk '/^[0-9a-f]+/ {print $1}')"
            CURRENT_REVS="$(aud_run flask db current | awk '/^[0-9a-f]+/ {print $1}')"
            echo "Heads:   ${HEAD_REVS}"
            echo "Current: ${CURRENT_REVS}"
            for rev in $HEAD_REVS; do
              echo "$CURRENT_REVS" | grep -qx "$rev" || {
                echo "❌ DB is not at required Alembic head: $rev"
                exit 1
              }
            done

            echo "✅ Verify finance_accounting_periods exists"
            aud_run python -c "from sqlalchemy import inspect, text; from audela import create_app; from audela.extensions import db; app=create_app(); ctx=app.app_context(); ctx.push(); exists=db.session.execute(text(\"SELECT to_regclass('public.finance_accounting_periods')\")).scalar(); assert exists, 'finance_accounting_periods table not found'; ci=inspect(db.engine); tables=set(ci.get_table_names()); assert 'credit_borrowers' in tables, 'credit_borrowers table not found'; assert 'credit_covenants' in tables, 'credit_covenants table not found'; assert 'credit_facility_utilizations' in tables, 'credit_facility_utilizations table not found'; cols={c['name'] for c in ci.get_columns('credit_borrowers')}; assert 'sector_id' in cols and 'country_id' in cols and 'rating_id' in cols, 'credit_borrowers FK columns missing'; assert 'approval_date' in {c['name'] for c in ci.get_columns('credit_deals')}, 'credit_deals.approval_date missing'; assert 'approval_date' in {c['name'] for c in ci.get_columns('credit_facilities')}, 'credit_facilities.approval_date missing'; assert 'approval_date' in {c['name'] for c in ci.get_columns('credit_financial_statements')}, 'credit_financial_statements.approval_date missing'; assert 'approval_date' in {c['name'] for c in ci.get_columns('credit_memos')}, 'credit_memos.approval_date missing'; print('finance_accounting_periods table found:', exists); print('credit schema including covenant/utilization tables verified'); ctx.pop()"

            echo "🧪 Credit readiness validation"
            aud_run python validate_credit_readiness.py --mode all

            echo "🔄 Final restart of audela container"
            $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml up -d --no-deps --force-recreate audela

            echo "✅ Migrations-only job completed"

      - name: Run migrations via SSH (root, attempt 2)
        id: migrate_ssh_2
        if: steps.migrate_ssh_1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 90s
          command_timeout: 40m
          script: *migrate_script

      - name: Fail if migrations SSH failed twice
        if: steps.migrate_ssh_1.outcome == 'failure' && steps.migrate_ssh_2.outcome == 'failure'
        run: |
          echo "❌ Migrations SSH failed twice (connection/handshake issue)."
          exit 1
