name: Deploy Flask App (root)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      celery_action:
        description: "Celery mode during deploy"
        required: true
        type: choice
        options:
          - keep
          - enable
          - disable
        default: disable

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: audeladesdonnees

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH as root (attempt 1)
        id: deploy_ssh_1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 90s
          command_timeout: 40m

          script: &deploy_script |
            set -e
            echo "🚀 Deploy started (root)"

            CELERY_ACTION="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.celery_action || 'disable' }}"
            echo "🧭 Celery action for this deploy: ${CELERY_ACTION}"

            cd /root/audela_flask_website

            echo "📥 Git pull"
            git reset --hard
            git pull origin main

            # Never run full install here (it rebuilds celery image too).
            # This deploy job updates only web app service.
            if [ ! -f .env ]; then
              echo "⚠️ .env missing on server"
              if [ -n "${{ secrets.SERVER_ENV_FILE }}" ]; then
                printf "%s" "${{ secrets.SERVER_ENV_FILE }}" > .env
                chmod 600 .env || true
                echo "✅ .env bootstrapped from GitHub secret SERVER_ENV_FILE"
              else
                echo "❌ .env missing and secret SERVER_ENV_FILE is not set"
                echo "   Configure SERVER_ENV_FILE (full .env content) in GitHub Environment secrets."
                exit 1
              fi
            fi

            upsert_env_var () {
              local key="$1"
              local val="$2"
              if [ -z "$val" ]; then
                return 0
              fi
              if grep -qE "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                printf "\n%s=%s\n" "$key" "$val" >> .env
              fi
            }

            upsert_env_var "GRAFANA_HOSTNAME" "${{ secrets.GRAFANA_HOSTNAME }}"
            upsert_env_var "GRAFANA_HOSTNAME_ALT" "${{ secrets.GRAFANA_HOSTNAME_ALT }}"
            chmod 600 .env || true

            echo "⚡ Incremental deploy (audela only, skip celery image rebuild)"
            COMPOSE_CMD="docker compose"
            if ! docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            fi
            $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml build audela
            $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml up -d --no-deps audela

            echo "🗃️ Apply DB migrations"
            # RUN_MIGRATIONS=1 is already set on container startup; this explicit step
            # guarantees latest schema after deploy.
            COMPOSE_CMD="docker compose"
            if ! docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            fi

            # Use one-off container runs for migrations so deploy still works even if
            # audela service is restarting due to schema checks before upgrade.
            aud_run () {
              $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml run --rm --no-deps audela "$@"
            }

            # Pre-fix: if known tables already exist, mark corresponding migrations as applied.
            pre_stamp_if_exists () {
              local tbl="$1"
              local rev="$2"
              local exists
              exists="$(aud_run python -c "from sqlalchemy import text; from audela import create_app; from audela.extensions import db; app=create_app(); ctx=app.app_context(); ctx.push(); e=db.session.execute(text(\"SELECT to_regclass('public.${tbl}')\")).scalar(); print('1' if e else '0'); ctx.pop()" 2>/dev/null || echo 0)"
              if [ "$exists" = "1" ]; then
                echo "ℹ️ ${tbl} exists -> pre-stamp ${rev}"
                aud_run flask db stamp "$rev" || true
              fi
            }

            pre_stamp_if_all_tables_exist () {
              local rev="$1"
              shift
              local all_exist="1"
              local tbl
              local exists

              for tbl in "$@"; do
                exists="$(aud_run python -c "from sqlalchemy import text; from audela import create_app; from audela.extensions import db; app=create_app(); ctx=app.app_context(); ctx.push(); e=db.session.execute(text(\"SELECT to_regclass('public.${tbl}')\")).scalar(); print('1' if e else '0'); ctx.pop()" 2>/dev/null || echo 0)"
                if [ "$exists" != "1" ]; then
                  all_exist="0"
                  echo "ℹ️ ${tbl} missing -> not stamping ${rev}"
                  break
                fi
              done

              if [ "$all_exist" = "1" ]; then
                echo "ℹ️ all target tables exist -> pre-stamp ${rev}"
                aud_run flask db stamp "$rev" || true
              fi
            }

            pre_stamp_if_exists project_workspaces 20260220_add_project_workspaces
            pre_stamp_if_exists finance_investments 20260221_add_finance_investments
            pre_stamp_if_exists finance_accounting_periods 20260221_add_finance_accounting_periods
            pre_stamp_if_all_tables_exist 7811fe58d1ac \
              finance_products \
              finance_daily_balances \
              finance_adjustments \
              finance_adjustment_logs \
              finance_counterparty_attributes \
              finance_gocardless_connections \
              finance_gocardless_sync_logs

            pre_stamp_if_all_tables_exist 20260305_add_credit_module_tables \
              credit_borrowers \
              credit_deals \
              credit_facilities \
              credit_collaterals \
              credit_guarantors \
              credit_financial_statements \
              credit_ratio_snapshots \
              credit_memos \
              credit_approvals \
              credit_documents

            # Clean up partial credit reference data if migration failed due to NOT NULL constraint
            cleanup_credit_ref_data () {
              echo "🧹 Cleaning up partial credit reference data..."
              for tbl in credit_countries credit_sectors credit_ratings credit_facility_types credit_collateral_types credit_guarantee_types; do
                aud_run python -c "from sqlalchemy import text; from audela import create_app; from audela.extensions import db; app=create_app(); ctx=app.app_context(); ctx.push(); db.session.execute(text('TRUNCATE TABLE ${tbl} CASCADE')); db.session.commit(); ctx.pop()" 2>/dev/null || true
              done
            }

            # Retry migrations to handle transient startup race conditions
            MIG_OK=0
            for i in $(seq 1 5); do
              echo "🧭 Alembic heads (attempt $i):"
              aud_run flask db heads || true

              set +e
              MIG_OUT="$(aud_run flask db upgrade 2>&1)"
              MIG_RC=$?
              set -e

              if [ "$MIG_RC" -eq 0 ]; then
                echo "$MIG_OUT"
                MIG_OK=1
                break
              fi
              echo "$MIG_OUT"

              # Handle NOT NULL constraint violations on reference tables
              if echo "$MIG_OUT" | grep -Eqi "NotNullViolation.*created_at.*credit_"; then
                echo "⚠️ NOT NULL violation on credit reference tables detected -> cleaning and retrying"
                cleanup_credit_ref_data
                sleep 2
                continue
              fi

              if echo "$MIG_OUT" | grep -Eqi "DuplicateTable|already exists"; then
                if echo "$MIG_OUT" | grep -Eqi "project_workspaces"; then
                  echo "⚠️ project_workspaces already exists -> stamping migration 20260220_add_project_workspaces"
                  aud_run flask db stamp 20260220_add_project_workspaces || true
                elif echo "$MIG_OUT" | grep -Eqi "finance_investments"; then
                  echo "⚠️ finance_investments already exists -> stamping migration 20260221_add_finance_investments"
                  aud_run flask db stamp 20260221_add_finance_investments || true
                elif echo "$MIG_OUT" | grep -Eqi "finance_accounting_periods"; then
                  echo "⚠️ finance_accounting_periods already exists -> stamping migration 20260221_add_finance_accounting_periods"
                  aud_run flask db stamp 20260221_add_finance_accounting_periods || true
                elif echo "$MIG_OUT" | grep -Eqi "finance_products|finance_daily_balances|finance_adjustments|finance_adjustment_logs|finance_counterparty_attributes|finance_gocardless_connections|finance_gocardless_sync_logs"; then
                  echo "⚠️ finance models tables conflict detected -> validating full set before stamping 7811fe58d1ac"
                  pre_stamp_if_all_tables_exist 7811fe58d1ac \
                    finance_products \
                    finance_daily_balances \
                    finance_adjustments \
                    finance_adjustment_logs \
                    finance_counterparty_attributes \
                    finance_gocardless_connections \
                    finance_gocardless_sync_logs
                fi
                if aud_run flask db upgrade heads; then
                  MIG_OK=1
                  break
                fi
              fi

              # Fallback for temporary multi-head situations
              if aud_run flask db upgrade heads; then
                MIG_OK=1
                break
              fi

              echo "⚠️ Migration attempt $i failed, retrying..."
              sleep 4
            done

            if [ "$MIG_OK" -ne 1 ]; then
              echo "❌ Migration failed after retries"
              exit 1
            fi

            echo "🧪 Ensure database is at Alembic head(s)"
            HEAD_REVS="$(aud_run flask db heads | awk '/^[0-9a-f]+/ {print $1}')"
            CURRENT_REVS="$(aud_run flask db current | awk '/^[0-9a-f]+/ {print $1}')"
            echo "Heads:   ${HEAD_REVS}"
            echo "Current: ${CURRENT_REVS}"
            for rev in $HEAD_REVS; do
              echo "$CURRENT_REVS" | grep -qx "$rev" || {
                echo "❌ DB is not at required Alembic head: $rev"
                exit 1
              }
            done

            echo "🔎 Verify migration objects"
            aud_run python -c "from sqlalchemy import inspect, text; from audela import create_app; from audela.extensions import db; app=create_app(); ctx=app.app_context(); ctx.push(); exists=db.session.execute(text(\"SELECT to_regclass('public.finance_accounting_periods')\")).scalar(); assert exists, 'finance_accounting_periods table not found'; ci=inspect(db.engine); tables=set(ci.get_table_names()); assert 'credit_borrowers' in tables, 'credit_borrowers table not found'; assert 'credit_countries' in tables, 'credit_countries table not found'; assert 'credit_covenants' in tables, 'credit_covenants table not found'; assert 'credit_facility_utilizations' in tables, 'credit_facility_utilizations table not found'; cols={c['name'] for c in ci.get_columns('credit_borrowers')}; assert 'sector_id' in cols and 'country_id' in cols and 'rating_id' in cols, 'credit_borrowers FK columns missing'; assert 'approval_date' in {c['name'] for c in ci.get_columns('credit_deals')}, 'credit_deals.approval_date missing'; assert 'approval_date' in {c['name'] for c in ci.get_columns('credit_facilities')}, 'credit_facilities.approval_date missing'; assert 'approval_date' in {c['name'] for c in ci.get_columns('credit_financial_statements')}, 'credit_financial_statements.approval_date missing'; assert 'approval_date' in {c['name'] for c in ci.get_columns('credit_memos')}, 'credit_memos.approval_date missing'; print('finance_accounting_periods table found:', exists); print('credit schema including covenant/utilization tables verified'); ctx.pop()"

            echo "🔄 Restart service"
            systemctl restart audeladedonnees

            echo "🌐 Refresh Traefik to apply dynamic routers/services"
            $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml up -d --no-deps traefik

            echo "🔎 Verify Traefik routing/cert hints for grenobleski domains"
            set +e
            HTTP_WWW_CODE="$(curl -s -o /dev/null -w '%{http_code}' -H 'Host: www.grenobleski.fr' http://127.0.0.1/)"
            HTTP_ROOT_CODE="$(curl -s -o /dev/null -w '%{http_code}' -H 'Host: grenobleski.fr' http://127.0.0.1/)"
            set -e
            echo "ℹ️ HTTP status with Host www.grenobleski.fr: ${HTTP_WWW_CODE}"
            echo "ℹ️ HTTP status with Host grenobleski.fr: ${HTTP_ROOT_CODE}"

            if $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml exec -T traefik sh -lc "test -s /letsencrypt/acme.json && grep -q 'www.grenobleski.fr' /letsencrypt/acme.json && grep -q 'grenobleski.fr' /letsencrypt/acme.json"; then
              echo "✅ Let's Encrypt certificates found in acme.json for grenobleski.fr and www.grenobleski.fr"
            else
              echo "⚠️ Certificates not yet found in acme.json for grenobleski domains."
              echo "   This can be normal right after deploy; certs are issued on first successful challenge/request."
              echo "   Check: docker compose -f docker-compose.yml -f docker-compose.letsencrypt.yml logs --tail=200 traefik"
            fi

            if [ "$CELERY_ACTION" = "disable" ]; then
              echo "⏸️ Disabling Celery services for low-resource mode"
              $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml stop celery-beat celery-worker || true
              $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml rm -f celery-beat celery-worker || true
            elif [ "$CELERY_ACTION" = "enable" ]; then
              echo "▶️ Enabling Celery services"
              $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml up -d --no-deps celery-worker celery-beat
            else
              echo "ℹ️ Keeping current Celery state"
            fi

            echo "✅ Deploy completed"

      - name: Deploy via SSH as root (attempt 2)
        id: deploy_ssh_2
        if: steps.deploy_ssh_1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 90s
          command_timeout: 40m
          script: *deploy_script

      - name: Fail if SSH deploy failed twice
        if: steps.deploy_ssh_1.outcome == 'failure' && steps.deploy_ssh_2.outcome == 'failure'
        run: |
          echo "❌ SSH deploy failed twice (connection/handshake issue)."
          echo "Check SSH daemon/fail2ban/network path and rerun workflow."
          exit 1