name: Build Celery Image (manual)

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR"
        type: boolean
        required: true
        default: true
      image_tag:
        description: "Image tag suffix (example: v1.0.0 or 2026-02-24)"
        type: string
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-celery-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
          REPO: ghcr.io/${{ github.repository }}
        run: |
          set -e
          SHORT_SHA="${GITHUB_SHA::7}"
          BASE_TAG="celery-${SHORT_SHA}"
          if [ -n "${INPUT_TAG}" ]; then
            SAFE_TAG="$(echo "${INPUT_TAG}" | tr '[:upper:] ' '[:lower:]-' | tr -cd 'a-z0-9._-')"
            BASE_TAG="celery-${SAFE_TAG}"
          fi
          echo "tag=${BASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${REPO}" >> "$GITHUB_OUTPUT"

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ inputs.push_image }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:celery-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Image: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "Push enabled: ${{ inputs.push_image }}" >> $GITHUB_STEP_SUMMARY
          echo "Also tagged as: ${{ steps.meta.outputs.image }}:celery-latest" >> $GITHUB_STEP_SUMMARY
