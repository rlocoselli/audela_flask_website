name: Grafana - Create Admin User

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Grafana username (login)"
        required: true
        type: string
      email:
        description: "Grafana user email"
        required: true
        type: string
      name:
        description: "Grafana display name"
        required: false
        default: ""
        type: string
      password:
        description: "Password for the new Grafana admin user"
        required: true
        type: string
      update_existing:
        description: "Update password if user already exists"
        required: true
        default: true
        type: boolean

jobs:
  create-grafana-admin:
    runs-on: ubuntu-latest
    environment: audeladesdonnees

    steps:
      - name: Create Grafana admin user via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 10m
          script: |
            set -e

            cd /root/audela_flask_website

            COMPOSE_CMD="docker compose"
            if ! docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            fi

            GF_USERNAME="${{ github.event.inputs.username }}"
            GF_EMAIL="${{ github.event.inputs.email }}"
            GF_NAME="${{ github.event.inputs.name }}"
            UPDATE_EXISTING="${{ github.event.inputs.update_existing }}"
            GF_PASSWORD="${{ github.event.inputs.password }}"

            # Read bootstrap admin credentials from the server .env (same source as docker-compose)
            if [ -f /root/audela_flask_website/.env ]; then
              GF_ADMIN_USER=$(grep -E '^GRAFANA_ADMIN_USER=' /root/audela_flask_website/.env | cut -d= -f2- | tr -d '"' | tr -d "'")
              GF_ADMIN_PASSWORD=$(grep -E '^GRAFANA_ADMIN_PASSWORD=' /root/audela_flask_website/.env | cut -d= -f2- | tr -d '"' | tr -d "'")
            fi

            # Fallback to GitHub secrets if set
            if [ -z "$GF_ADMIN_USER" ]; then
              GF_ADMIN_USER="${{ secrets.GRAFANA_ADMIN_USER }}"
            fi
            if [ -z "$GF_ADMIN_PASSWORD" ]; then
              GF_ADMIN_PASSWORD="${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
            fi

            if [ -z "$GF_USERNAME" ] || [ -z "$GF_EMAIL" ]; then
              echo "❌ username and email are required"
              exit 1
            fi

            if [ -z "$GF_PASSWORD" ]; then
              echo "❌ Missing required workflow input: password"
              exit 1
            fi

            if [ -z "$GF_ADMIN_USER" ] || [ -z "$GF_ADMIN_PASSWORD" ]; then
              echo "❌ GRAFANA_ADMIN_USER / GRAFANA_ADMIN_PASSWORD not found in .env or GitHub secrets"
              exit 1
            fi

            # Ensure grafana is running
            $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml up -d grafana

            DISPLAY_NAME="${GF_NAME:-$GF_USERNAME}"

            # Use Python requests from audela image instead of BusyBox wget in grafana image.
            $COMPOSE_CMD -f docker-compose.yml -f docker-compose.letsencrypt.yml run --rm --no-deps -T \
              -e GF_USERNAME="$GF_USERNAME" \
              -e GF_EMAIL="$GF_EMAIL" \
              -e GF_NAME="$DISPLAY_NAME" \
              -e GF_PASSWORD="$GF_PASSWORD" \
              -e UPDATE_EXISTING="$UPDATE_EXISTING" \
              -e GF_ADMIN_USER="$GF_ADMIN_USER" \
              -e GF_ADMIN_PASSWORD="$GF_ADMIN_PASSWORD" \
              --entrypoint python audela - <<'PY'
              import os
              import sys
              import time
              import requests

              base = os.environ.get("GF_URL", "http://grafana:3000").rstrip("/")
              admin_user = os.environ["GF_ADMIN_USER"]
              admin_password = os.environ["GF_ADMIN_PASSWORD"]
              username = os.environ["GF_USERNAME"]
              email = os.environ["GF_EMAIL"]
              display_name = os.environ.get("GF_NAME") or username
              password = os.environ["GF_PASSWORD"]
              update_existing = (os.environ.get("UPDATE_EXISTING", "true").lower() == "true")

              sess = requests.Session()
              sess.auth = (admin_user, admin_password)
              sess.headers.update({"Content-Type": "application/json"})

              print("⏳ Waiting for Grafana API...")
              for i in range(15):
                try:
                  r = sess.get(f"{base}/api/health", timeout=5)
                  if r.ok and "ok" in r.text.lower():
                    print("✅ Grafana API ready")
                    break
                except Exception:
                  pass
                time.sleep(2)
              else:
                print("❌ Grafana API not ready after 30s")
                sys.exit(1)

              lookup = sess.get(f"{base}/api/users/lookup", params={"loginOrEmail": username}, timeout=10)

              if lookup.status_code == 200:
                user_id = lookup.json().get("id")
                if not user_id:
                  print("❌ Could not parse existing user id")
                  sys.exit(1)

                if not update_existing:
                  print(f"⚠️ User '{username}' already exists and update_existing=false - skipping")
                  sys.exit(0)

                print(f"🔄 User '{username}' exists (id={user_id}), updating password and promoting to Admin...")
                pw = sess.put(f"{base}/api/admin/users/{user_id}/password", json={"password": password}, timeout=10)
                if pw.status_code not in (200, 204):
                  print(f"❌ Failed to update password: {pw.status_code} {pw.text}")
                  sys.exit(1)

                # Org role update may depend on org context; do best-effort.
                role = sess.patch(f"{base}/api/org/users/{user_id}", json={"role": "Admin"}, timeout=10)
                if role.status_code not in (200, 202, 204, 404):
                  print(f"⚠️ Could not set org Admin role: {role.status_code} {role.text}")

                perms = sess.put(f"{base}/api/admin/users/{user_id}/permissions", json={"isGrafanaAdmin": True}, timeout=10)
                if perms.status_code not in (200, 204):
                  print(f"❌ Failed to grant Grafana admin: {perms.status_code} {perms.text}")
                  sys.exit(1)

                print(f"✅ User '{username}' updated and promoted to Admin")
                sys.exit(0)

              if lookup.status_code not in (404,):
                print(f"❌ User lookup failed: {lookup.status_code} {lookup.text}")
                sys.exit(1)

              print(f"➕ Creating new Grafana Admin user '{username}'...")
              create = sess.post(
                f"{base}/api/admin/users",
                json={"name": display_name, "email": email, "login": username, "password": password},
                timeout=10,
              )
              if create.status_code not in (200, 201):
                print(f"❌ Failed to create user: {create.status_code} {create.text}")
                sys.exit(1)

              data = create.json() if create.text else {}
              user_id = data.get("id")
              if not user_id:
                # Try lookup fallback if API did not return id.
                lookup2 = sess.get(f"{base}/api/users/lookup", params={"loginOrEmail": username}, timeout=10)
                if lookup2.status_code == 200:
                  user_id = lookup2.json().get("id")

              if not user_id:
                print(f"❌ User created but id not found. Response: {create.text}")
                sys.exit(1)

              role = sess.patch(f"{base}/api/org/users/{user_id}", json={"role": "Admin"}, timeout=10)
              if role.status_code not in (200, 202, 204, 404):
                print(f"⚠️ Could not set org Admin role: {role.status_code} {role.text}")

              perms = sess.put(f"{base}/api/admin/users/{user_id}/permissions", json={"isGrafanaAdmin": True}, timeout=10)
              if perms.status_code not in (200, 204):
                print(f"❌ Failed to grant Grafana admin: {perms.status_code} {perms.text}")
                sys.exit(1)

              print(f"✅ User '{username}' created (id={user_id}) and promoted to Admin")
              PY
