# TLS certs (bring-your-own). Put the files in ./certs/
#  - certs/fullchain.pem
#  - certs/privkey.pem
# If you prefer Let's Encrypt, use docker-compose.letsencrypt.yml instead.

tls:
  certificates:
    - certFile: /certs/fullchain.pem
      keyFile: /certs/privkey.pem

http:
  routers:
    grenobleski-http:
      rule: "Host(`grenobleski.fr`) || Host(`www.grenobleski.fr`)"
      entryPoints:
        - web
      middlewares:
        - grenobleski-https-redirect
      service: grenobleski-svc

    grenobleski-https:
      rule: "Host(`grenobleski.fr`) || Host(`www.grenobleski.fr`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: grenobleski-svc

    bilieu-http:
      rule: "Host(`bilieu.fr`) || Host(`www.bilieu.fr`)"
      entryPoints:
        - web
      middlewares:
        - bilieu-https-redirect
      service: bilieu-svc

    bilieu-https:
      rule: "Host(`bilieu.fr`) || Host(`www.bilieu.fr`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: bilieu-svc

  middlewares:
    grenobleski-https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

    bilieu-https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    grenobleski-svc:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8081"
        passHostHeader: true

    bilieu-svc:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8082"
        passHostHeader: true
