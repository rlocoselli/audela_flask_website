# Dynamic routers/services config.
# TLS certificates are handled by Let's Encrypt (certResolver: letsencrypt)
# from docker-compose configuration.

http:
  routers:
    grenobleski-http:
      rule: "Host(`grenobleski.fr`) || Host(`www.grenobleski.fr`)"
      entryPoints:
        - web
      middlewares:
        - grenobleski-https-redirect
      service: grenobleski-svc

    grenobleski-https:
      rule: "Host(`grenobleski.fr`) || Host(`www.grenobleski.fr`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
        domains:
          - main: grenobleski.fr
            sans:
              - www.grenobleski.fr
      service: grenobleski-svc

    domusbiliacum-http:
      rule: "Host(`domusbiliacum.fr`) || Host(`www.domusbiliacum.fr`)"
      entryPoints:
        - web
      middlewares:
        - domusbiliacum-https-redirect
      service: domusbiliacum-svc

    domusbiliacum-https:
      rule: "Host(`domusbiliacum.fr`) || Host(`www.domusbiliacum.fr`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
        domains:
          - main: domusbiliacum.fr
            sans:
              - www.domusbiliacum.fr
      service: domusbiliacum-svc

    bilieu-http:
      rule: "Host(`bilieu.fr`) || Host(`www.bilieu.fr`)"
      entryPoints:
        - web
      middlewares:
        - bilieu-https-redirect
      service: domusbiliacum-svc

    bilieu-https:
      rule: "Host(`bilieu.fr`) || Host(`www.bilieu.fr`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
        domains:
          - main: bilieu.fr
            sans:
              - www.bilieu.fr
      service: domusbiliacum-svc

    nutritiontracker-http:
      rule: "Host(`nutritiontracker.fr`) || Host(`www.nutritiontracker.fr`)"
      entryPoints:
        - web
      middlewares:
        - nutritiontracker-https-redirect
      service: nutritiontracker-svc

    nutritiontracker-https:
      rule: "Host(`nutritiontracker.fr`) || Host(`www.nutritiontracker.fr`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
        domains:
          - main: nutritiontracker.fr
            sans:
              - www.nutritiontracker.fr
      service: nutritiontracker-svc

    api-nutritiontracker-http:
      rule: "Host(`api.nutritiontracker.fr`) || Host(`api.nutritracker.fr`)"
      entryPoints:
        - web
      middlewares:
        - nutritiontracker-https-redirect
      service: nutritiontracker-api-svc

    api-nutritiontracker-https:
      rule: "Host(`api.nutritiontracker.fr`) || Host(`api.nutritracker.fr`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
        domains:
          - main: api.nutritiontracker.fr
            sans:
              - api.nutritracker.fr
      service: nutritiontracker-api-svc

    nutritiontracker-aliases-http:
      rule: "Host(`www.nutritracker.fr`) || Host(`nutricker.fr`)"
      entryPoints:
        - web
      middlewares:
        - nutritiontracker-https-redirect
      service: nutritiontracker-svc

    nutritiontracker-aliases-https:
      rule: "Host(`www.nutritracker.fr`) || Host(`nutricker.fr`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
        domains:
          - main: www.nutritracker.fr
            sans:
              - nutricker.fr
      service: nutritiontracker-svc

  middlewares:
    grenobleski-https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

    domusbiliacum-https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

    bilieu-https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

    nutritiontracker-https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    grenobleski-svc:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8081"
        passHostHeader: true

    domusbiliacum-svc:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8082"
        passHostHeader: true

    nutritiontracker-svc:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8086"
        passHostHeader: true

    nutritiontracker-api-svc:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8090"
        passHostHeader: true
