# Dynamic routers/services config.
# TLS certificates are handled by Let's Encrypt (certResolver: letsencrypt)
# from docker-compose configuration.

http:
  routers:
    grenobleski-http:
      rule: "Host(`grenobleski.fr`) || Host(`www.grenobleski.fr`)"
      entryPoints:
        - web
      middlewares:
        - grenobleski-https-redirect
      service: grenobleski-svc

    grenobleski-https:
      rule: "Host(`grenobleski.fr`) || Host(`www.grenobleski.fr`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: grenobleski-svc

    domusbiliacum-http:
      rule: "Host(`domusbiliacum.fr`) || Host(`www.domusbiliacum.fr`)"
      entryPoints:
        - web
      middlewares:
        - domusbiliacum-https-redirect
      service: domusbiliacum-svc

    domusbiliacum-https:
      rule: "Host(`domusbiliacum.fr`) || Host(`www.domusbiliacum.fr`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: domusbiliacum-svc

    bilieu-http:
      rule: "Host(`bilieu.fr`) || Host(`www.bilieu.fr`)"
      entryPoints:
        - web
      middlewares:
        - bilieu-https-redirect
      service: domusbiliacum-svc

    bilieu-https:
      rule: "Host(`bilieu.fr`) || Host(`www.bilieu.fr`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: domusbiliacum-svc

  middlewares:
    grenobleski-https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

    domusbiliacum-https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

    bilieu-https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    grenobleski-svc:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8081"
        passHostHeader: true

    domusbiliacum-svc:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8082"
        passHostHeader: true
